name: Build NanoPi M1 Plus (OpenWrt 23.05 + OpenClash)

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: "Publish a GitHub Release with the images"
        type: boolean
        required: false
        default: true
  push:
    branches:
      - nanopi-m1-plus-23.05
    paths:
      - ".github/workflows/build-nanopi-m1-plus.yml"
      - ".github/nanopi-m1-plus/**"
      - "target/linux/sunxi/patches-5.15/700-arm-dts-sun8i-h3-nanopi-m1-plus-*"

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  CONFIG_FILE: .github/nanopi-m1-plus/config.seed
  FEEDS_EXTRA: .github/nanopi-m1-plus/feeds.extra.conf
  # Opt into Node.js 24 for any JS-based action still bundled with Node 20.
  # See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-22.04
    # ~5h safety budget; sunxi/cortexa7 + OpenClash typically finishes in 2-3h.
    timeout-minutes: 330

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Free up disk space on runner
        run: |
          echo "=== before ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /usr/lib/jvm \
                      "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get -y purge --auto-remove \
              azure-cli google-cloud-sdk google-chrome-stable firefox \
              microsoft-edge-stable mono-* powershell \
              'dotnet-*' 'llvm-*' 'php*' 'mysql-*' 'mongodb-*' || true
          sudo apt-get -y autoremove --purge
          sudo apt-get -y clean
          sudo docker image prune --all --force || true
          echo "=== after ==="
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-setuptools \
            python3-pyelftools rsync swig unzip zlib1g-dev file wget \
            libelf-dev ecj fastjar java-propose-classpath \
            libxml2-utils subversion zstd
          sudo timedatectl set-timezone "$TZ" || true

      - name: Append extra feeds
        run: |
          cat "$FEEDS_EXTRA" >> feeds.conf.default
          echo "--- feeds.conf.default ---"
          cat feeds.conf.default

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Drop duplicate packages from small-package feed
        # small-package ships a few packages that already exist in the official
        # packages/luci feeds (e.g. ddns-scripts, some kmod stubs); prefer the
        # upstream versions by removing the duplicates that small-package put
        # into feeds/small8/* .  `feeds install -a` already resolves conflicts
        # by last-writer-wins, so normally nothing to do - this step is kept
        # as a placeholder for future conflict handling.
        run: |
          ls feeds/small8 | head -20 || true

      - name: Generate .config
        run: |
          cp "$CONFIG_FILE" .config
          make defconfig
          echo "--- effective target ---"
          grep -E '^CONFIG_TARGET_(sunxi|DEVICE)' .config | head -10
          echo "--- selected pkgs (sample) ---"
          grep -E '^CONFIG_PACKAGE_(luci-app-|openclash|smartdns|adguardhome|mosdns|adblock)' .config | head

      - name: Download package sources
        run: |
          make download -j8 V=s 2>&1 | tail -30 || true
          # Anything smaller than 1 KiB is typically a broken download; retry.
          find dl -size -1024c -type f -delete || true
          make download -j1 V=s

      - name: Build tools + toolchain
        run: |
          make tools/install -j$(nproc) V=s || make tools/install -j1 V=s
          make toolchain/install -j$(nproc) V=s || make toolchain/install -j1 V=s

      - name: Build kernel + packages + image
        run: |
          make -j$(nproc) V=s \
            || make -j1 V=s
          echo "--- free disk after build ---"
          df -h /
          echo "--- build artifacts ---"
          ls -lh bin/targets/sunxi/cortexa7/ || true

      - name: Collect artifacts
        id: collect
        run: |
          OUT=out/nanopi-m1-plus
          mkdir -p "$OUT"
          cp -v bin/targets/sunxi/cortexa7/openwrt-sunxi-cortexa7-friendlyarm_nanopi-m1-plus-* "$OUT"/ || true
          cp -v bin/targets/sunxi/cortexa7/sha256sums "$OUT"/ 2>/dev/null || true
          cp -v bin/targets/sunxi/cortexa7/config.buildinfo "$OUT"/ 2>/dev/null || true
          cp -v .config "$OUT"/.config.full
          ls -lh "$OUT"
          echo "out_dir=$OUT" >> "$GITHUB_OUTPUT"
          echo "tag=nanopi-m1-plus-$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-nanopi-m1-plus
          path: ${{ steps.collect.outputs.out_dir }}
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ inputs.upload_release != false }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.collect.outputs.tag }}
          name: NanoPi M1 Plus build ${{ steps.collect.outputs.tag }}
          body: |
            ## NanoPi M1 Plus (Allwinner H3) - OpenWrt 23.05

            Base:      openwrt-23.05 (kernel 5.15)
            Device:    `friendlyarm_nanopi-m1-plus`

            ### Included fixes
            - `target/linux/sunxi/patches-5.15/700-arm-dts-sun8i-h3-nanopi-m1-plus-fix-rgmii-phy-mode.patch`
              changes `phy-mode` from `"rgmii"` to `"rgmii-id"` so the
              RTL8211E PHY inserts the required internal RGMII clock delays.
              This fixes the "link up / LEDs on / no traffic" symptom.

            ### Included packages
            - LuCI (bootstrap) + Chinese i18n
            - OpenClash (`luci-app-openclash`)
            - SmartDNS + LuCI app
            - AdGuard Home + LuCI app
            - MosDNS + LuCI app
            - adblock-fast + LuCI app
            - `dnsmasq-full` (replaces `dnsmasq`)
            - SSH, htop, ethtool, tcpdump-mini, mtr, iperf3, curl, dig

            ### Flashing
            1. Download `openwrt-sunxi-cortexa7-friendlyarm_nanopi-m1-plus-squashfs-sdcard.img.gz`
            2. `gunzip` and write to an SD card with Balena Etcher / Raspberry Pi Imager /
               `dd if=... of=/dev/sdX bs=4M status=progress conv=fsync`
            3. Boot. LAN IP defaults to `192.168.1.1`, user `root`, no password.

            Build: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            ${{ steps.collect.outputs.out_dir }}/*
          draft: false
          prerelease: false
